# ============================================================
# Nginx 配置文件
#
# Nginx 在这里扮演两个角色：
# 1. 静态文件服务器：把 React 编译好的 HTML/JS/CSS 发给浏览器
# 2. 反向代理：把 /api 请求转发给后端服务
#
# 类比：Nginx 就像酒店前台
# - 客人要看菜单（静态页面）→ 直接递过去
# - 客人要点菜（API 请求）→ 转告给后厨（后端服务）
# ============================================================

server {
    listen 80;
    server_name localhost;

    # --- 静态文件（React 编译产物）---
    root /usr/share/nginx/html;
    index index.html;

    # --- API 请求转发给后端 ---
    # 所有 /api/ 开头的请求 → 转发到后端容器的 3001 端口
    # "server" 是 docker-compose 里后端服务的名字
    location /api/ {
        proxy_pass http://server:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- SPA 路由处理 ---
    # React 是单页应用，所有路由都由前端 JS 处理
    # 如果用户直接访问 /hotels/123，Nginx 找不到这个文件
    # 所以要把所有"找不到的路径"都返回 index.html，让 React Router 接管
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- 静态资源缓存 ---
    # JS/CSS/图片等文件名带 hash，可以长期缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
