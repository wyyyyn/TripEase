# ============================================================
# GitHub Actions 自动部署
#
# 触发条件：push 到 main 分支
# 做的事情：SSH 到服务器 → 拉最新代码 → 重新构建 Docker 容器
#
# 类比：你 push 代码就像"发了一条消息"，
# GitHub Actions 就是一个 24 小时在线的机器人，
# 收到消息后自动帮你去服务器上部署。
# ============================================================

name: Deploy to Server

# 什么时候触发？—— 推送到 main 分支时
on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest  # GitHub 提供的免费云机器，用来执行任务

    steps:
      # Step 1：通过 SSH 连接到你的腾讯云服务器，执行部署命令
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}         # 服务器 IP（从 GitHub Secrets 读取）
          username: ubuntu                          # SSH 用户名
          key: ${{ secrets.SERVER_SSH_KEY }}        # SSH 私钥（从 GitHub Secrets 读取）
          script: |
            cd ~/TripEase
            git pull origin main
            sudo docker compose up -d --build --force-recreate
