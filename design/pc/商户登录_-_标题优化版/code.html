<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>TripEase | Merchant Login</title>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ffd83d",
                        "navy-custom": "#1B263B",
                        "cream-bg": "#FAF8F5",
                        "background-light": "#f8f8f5",
                        "background-dark": "#231f0f",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "0.75rem", /* 12px as requested */
                        "xl": "1.25rem", /* 20px as requested */
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen font-display">
<div class="flex min-h-screen w-full flex-col lg:flex-row">
<!-- Left Side: Illustration and Brand Graphic -->
<div class="hidden lg:flex lg:w-1/2 bg-cream-bg dark:bg-slate-900 items-center justify-center p-12 relative overflow-hidden">
<!-- Decorative Circles -->
<div class="absolute -top-20 -left-20 w-64 h-64 rounded-full bg-primary/10 blur-3xl"></div>
<div class="absolute -bottom-20 -right-20 w-80 h-80 rounded-full bg-primary/20 blur-3xl"></div>
<div class="relative z-10 max-w-lg text-center">
<div class="mb-10 inline-flex items-center gap-3">
<div class="p-3 bg-primary rounded-xl shadow-sm">
<span class="material-symbols-outlined text-navy-custom text-3xl">travel_explore</span>
</div>
<span class="text-2xl font-extrabold tracking-tight text-navy-custom dark:text-primary">TripEase</span>
</div>
<div class="rounded-xl overflow-hidden shadow-2xl bg-white p-2 border border-slate-100 mb-8">
<img alt="Luxury hotel lobby illustration" class="rounded-lg w-full h-[400px] object-cover" data-alt="Modern luxury hotel lobby with warm lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6b7BZ36xVZzmBlpn54snyoDJ3mdT2lVzYHfQvDlwIwFLkRwhAIkdM5sfNEcJ2dbwiMoNTPDlSTkp9SGIT1ZHG8iFAV06OJpOBlycaVSbpB9pfqt4aMX3qsq8WoHlQbL6U7BhXBQ3L8dbdY3I1NezP-0R9auE2X1m3TTyd15fsPa0U98PnkDo3xKssxP3KXdAKWatr1llrv3Ei4eNlmGMCCBR8rkzPc__FLdvTpXqhqXScECWBnUHEeIk6czvuoQbQjOkBtY8r7Eg"/>
</div>
<h1 class="text-3xl font-bold text-navy-custom dark:text-slate-100 mb-4">掌控酒店运营，从这里开始</h1>
<p class="text-slate-600 dark:text-slate-400 text-lg">专为独立业主与连锁品牌打造的智能管理中枢</p>
</div>
</div>
<!-- Right Side: Login Form -->
<div class="flex-1 flex items-center justify-center p-6 sm:p-12 bg-white dark:bg-background-dark lg:bg-background-light lg:dark:bg-slate-950">
<div class="w-full max-w-md bg-white dark:bg-background-dark p-8 sm:p-10 rounded-xl shadow-xl lg:shadow-2xl border border-slate-100 dark:border-slate-800">
<!-- Logo Mobile/Top -->
<div class="flex flex-col items-center mb-8">
<div class="lg:hidden flex items-center gap-2 mb-6">
<span class="material-symbols-outlined text-primary text-3xl">travel_explore</span>
<span class="text-xl font-bold tracking-tight dark:text-white">TripEase</span>
</div>
<h2 class="text-2xl sm:text-3xl font-extrabold text-navy-custom dark:text-white text-4xl">欢迎回来</h2>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-center font-medium">请登录您的账户</p>
</div>
<!-- Form -->
<form action="#" class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="email">邮箱地址</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">mail</span>
<input class="w-full pl-12 pr-4 py-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-slate-400" id="email" placeholder="manager@hotel.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">密码</label>
<a class="text-xs font-bold text-navy-custom dark:text-primary hover:underline" href="#">忘记密码？</a>
</div>
<div class="relative group">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-12 pr-12 py-4 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none placeholder:text-slate-400" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-lg">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Other -->
<div class="flex items-center">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-5 h-5 rounded border-slate-300 dark:border-slate-700 text-primary focus:ring-primary transition-all cursor-pointer" type="checkbox"/>
<span class="text-sm text-slate-600 dark:text-slate-400 group-hover:text-slate-800 dark:group-hover:text-slate-200 transition-colors">记住我（7天内免登录）</span>
</label>
</div>
<!-- Submit Button -->
<button class="w-full py-4 px-6 bg-navy-custom hover:bg-slate-800 dark:bg-primary dark:text-navy-custom dark:hover:bg-primary/90 text-white font-bold rounded-lg shadow-lg shadow-navy-custom/20 dark:shadow-primary/10 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2" type="submit"><span>立即登录 ➜</span></button>
</form>
<!-- Footer Links -->
<div class="mt-8 pt-8 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-slate-600 dark:text-slate-400 text-sm">还没有账号？ <a class="text-navy-custom dark:text-primary font-bold hover:underline ml-1" href="#">联系销售顾问获取专属服务</a></p>
</div>
<!-- Trust Badges (Subtle) -->
<div class="mt-8 flex justify-center gap-6 opacity-40 grayscale hover:grayscale-0 transition-all">
<span class="material-symbols-outlined text-2xl" title="Secure Payment">verified_user</span>
<span class="material-symbols-outlined text-2xl" title="Global Support">public</span>
<span class="material-symbols-outlined text-2xl" title="Privacy Guaranteed">security</span>
</div>
</div>
<!-- Mobile Footer Copyright -->
<div class="absolute bottom-6 text-slate-400 text-xs lg:hidden">
                © 2024 TripEase Hotel Management System.
            </div>
</div>
</div>
</body></html>
